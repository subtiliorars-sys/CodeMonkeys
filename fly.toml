# CodeMonkeys — run `fly launch --copy-config --no-deploy` to claim an app name,
# then `fly volumes create cm_data --size 3`, set secrets, and `fly deploy`.
# SECURITY: this app executes code. It must NEVER share a machine or volume
# with any other app's data.
app = "codemonkeys"
primary_region = "dfw"

[build]

[env]
  DATA_DIR = "/data"
  SESSION_BUDGET_USD = "1.00"

[[mounts]]
  source = "cm_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0     # scale-to-zero: ~$0.15/mo when idle

  # Liveness probe hits the unauthenticated /healthz (W1) — leaks nothing
  # (status/uptime/session-count only). grace_period covers cold boot.
  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
