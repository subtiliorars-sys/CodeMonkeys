<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CodeMonkeys Companion</title>
<style>
  :root {
    --gold: #d4af37; --gold-bright: #f0c75e; --gold-dark: #a67c12;
    --bg: #050507; --bg2: #17130a; --cyan: #22d3ee; --cyan-soft: #a5f3fc;
    --fg: #e2e8f0; --dim: #94a3b8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 400px; min-height: 500px;
    background: var(--bg);
    color: var(--fg);
    font-family: ui-monospace, "Cascadia Code", "Source Code Pro", monospace;
    font-size: 13px;
    overflow-x: hidden;
  }
  header {
    background: linear-gradient(180deg, var(--bg2), var(--bg));
    border-bottom: 1px solid rgba(212,175,55,.25);
    padding: 14px 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .logo { font-size: 18px; color: var(--gold); text-shadow: 0 0 10px rgba(212,175,55,.4); letter-spacing: .06em; }
  .logo span { color: var(--cyan-soft); font-size: 11px; display: block; letter-spacing: 0; }
  main { padding: 16px; display: flex; flex-direction: column; gap: 14px; }
  .status-row { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-radius: 8px; background: var(--bg2); border: 1px solid rgba(212,175,55,.15); }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .status-dot.online { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
  .status-dot.offline { background: #ef4444; box-shadow: 0 0 6px #ef4444; }
  .status-dot.checking { background: var(--gold); box-shadow: 0 0 6px var(--gold); animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:.4 } }
  .status-text { flex: 1; }
  .status-label { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: .06em; }
  .status-value { font-size: 13px; }
  .btn {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 10px 16px; border-radius: 8px; border: none; cursor: pointer;
    font-family: inherit; font-size: 13px; font-weight: 600;
    text-decoration: none; width: 100%; transition: filter .15s;
  }
  .btn:hover { filter: brightness(1.1); }
  .btn-gold { background: linear-gradient(180deg, var(--gold-bright), var(--gold-dark)); color: #17130a; }
  .btn-outline { background: transparent; border: 1px solid rgba(212,175,55,.35); color: var(--gold); }
  .btn-outline:hover { background: rgba(212,175,55,.08); }
  .section-title { font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--dim); margin-bottom: 4px; }
  .info-card { padding: 10px 12px; border-radius: 6px; background: rgba(212,175,55,.05); border: 1px solid rgba(212,175,55,.1); font-size: 12px; line-height: 1.5; }
  .info-card code { color: var(--cyan); background: rgba(34,211,238,.1); padding: 1px 5px; border-radius: 3px; font-size: 11px; }
  footer { padding: 12px 16px; border-top: 1px solid rgba(212,175,55,.15); text-align: center; font-size: 10px; color: var(--dim); }
  .server-row { display: flex; gap: 8px; align-items: center; }
  .server-row input {
    flex: 1; padding: 8px 10px; border-radius: 6px;
    background: var(--bg2); border: 1px solid rgba(212,175,55,.2); color: var(--fg);
    font-family: inherit; font-size: 12px; outline: none;
  }
  .server-row input:focus { border-color: var(--gold); }
</style>
</head>
<body>

<header>
  <div class="logo">🦍 CodeMonkeys <span>AI Agent Companion</span></div>
</header>

<main>
  <div>
    <div class="section-title">Connection</div>
    <div class="status-row" id="status-card">
      <div class="status-dot checking" id="status-dot"></div>
      <div class="status-text">
        <div class="status-label">CodeMonkeys Server</div>
        <div class="status-value" id="status-msg">Checking…</div>
      </div>
    </div>
  </div>

  <div>
    <div class="section-title">Server URL</div>
    <div class="server-row">
      <input type="text" id="server-url" placeholder="https://codemonkeys.fly.dev" spellcheck="false">
      <button class="btn btn-outline" id="btn-save-url" style="width:auto;padding:8px 12px;">Save</button>
    </div>
  </div>

  <button class="btn btn-gold" id="btn-open-app">🚀 Open CodeMonkeys</button>

  <div>
    <div class="section-title">Quick Info</div>
    <div class="info-card" id="info-card">
      Use <code>Ctrl+Shift+K</code> to open this popup.<br>
      The chat bubble on web pages lets you query AI agents without leaving your tab.
    </div>
  </div>

  <div>
    <div class="section-title">Page Context</div>
    <div class="info-card" id="page-info">No page loaded.</div>
  </div>
</main>

<footer>&copy; CodeMonkeys — AI Agent Workspace</footer>

<script src="popup.js"></script>
</body>
</html>
