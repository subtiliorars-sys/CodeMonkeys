name: CI

# Smoke + tests on every push and PR. Python 3.12 mirrors the Fly Dockerfile
# (python:3.12-slim) so a pinned dep without a 3.12 wheel fails here, not in deploy.
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATA_DIR: ${{ github.workspace }}/data
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Import smoke test
        run: |
          mkdir -p "$DATA_DIR"
          python -c "import server" && echo "import server OK"

      - name: Run tests
        run: |
          mkdir -p "$DATA_DIR"
          # tests/ doesn't exist on main yet (first test lands in PR #12, and git
          # doesn't track empty dirs). Until then, skip rather than fail.
          if [ ! -d tests ]; then
            echo "::warning::No tests/ directory yet — skipping. Enforced once the first test (PR #12) lands."
            exit 0
          fi
          set +e
          python -m pytest tests/ -q
          code=$?
          set -e
          # pytest exit 5 = "no tests collected" (empty tests/); pass until tests
          # land. Real failures (exit 1) still fail the job.
          if [ "$code" -eq 5 ]; then
            echo "::warning::No tests collected yet (tests/ empty) — passing. Enforced once tests land."
            exit 0
          fi
          exit $code

  # Windows desktop deployment path. Mirrors the Linux `test` job but on
  # windows-latest so the Windows portability fixes (path-jail normalization,
  # sys.executable lint fallback, BASH_AVAILABLE / IS_WINDOWS skips) stay green
  # on the actual target OS. bash is available via the Git-for-Windows install
  # that ships with the Windows runner.
  test-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    env:
      DATA_DIR: ${{ github.workspace }}/data
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Import smoke test
        run: |
          mkdir -p "$DATA_DIR"
          python -c "import server" && echo "import server OK"

      - name: Run tests
        run: |
          mkdir -p "$DATA_DIR"
          if [ ! -d tests ]; then
            echo "::warning::No tests/ directory yet — skipping."
            exit 0
          fi
          set +e
          python -m pytest tests/ -q
          code=$?
          set -e
          if [ "$code" -eq 5 ]; then
            echo "::warning::No tests collected yet (tests/ empty) — passing."
            exit 0
          fi
          exit $code

  # Windows desktop BUILD verification. Actually runs the real packaging path
  # (PyInstaller onedir bundle -> NSIS installer) on windows-latest so a
  # broken desktop spec, missing data file, or NSIS script regression fails the
  # build in CI — not on the user's machine. NSIS isn't on the default runner,
  # so it's installed via Chocolatey first. The .exe/installer ship as artifacts.
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # needed for git diff with the prior commit

      - name: Skip if no desktop/build files changed
        id: filter
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -qE '^(desktop/|scripts/|requirements-desktop\.txt)'; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "::notice::desktop/build files changed — running full build"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "::notice::no desktop/build files changed — skipping build-windows"
          fi

      - name: Set up Python 3.12
        if: steps.filter.outputs.changed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node 20 (for vendored Tailwind build via npx)
        if: steps.filter.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install NSIS (makensis) via Chocolatey
        if: steps.filter.outputs.changed == 'true'
        run: choco install nsis --no-progress -y

      - name: Install desktop requirements
        if: steps.filter.outputs.changed == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-desktop.txt

      - name: Build PyInstaller bundle
        if: steps.filter.outputs.changed == 'true'
        run: |
          # build-windows.ps1 installs requirements again (harmless) and runs npx
          # Tailwind + PyInstaller. Invoke via PowerShell with the standard bypass.
          powershell -ExecutionPolicy Bypass -File scripts/build-windows.ps1

      - name: Build NSIS installer
        if: steps.filter.outputs.changed == 'true'
        run: |
          # PyInstaller output already exists; skip the re-build and only pack.
          powershell -ExecutionPolicy Bypass -File scripts/build-installer.ps1 -SkipPyInstaller

      - name: Verify artifacts exist
        if: steps.filter.outputs.changed == 'true'
        run: |
          test -f dist/CodeMonkeys/CodeMonkeys.exe
          test -n "$(ls dist/installers/*.exe 2>/dev/null)"
          echo "build outputs:"
          ls -lh dist/CodeMonkeys/CodeMonkeys.exe
          ls -lh dist/installers/*.exe

      - name: Upload desktop bundle
        if: steps.filter.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: codemonkeys-windows-bundle
          path: dist/CodeMonkeys
          if-no-files-found: error

      - name: Upload installer
        if: steps.filter.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: codemonkeys-windows-installer
          path: dist/installers/*.exe
          if-no-files-found: error

  # security: dependency vulnerability scanning (#183). Fails on ANY known
  # vulnerability (CVE/GHSA) in a resolved dependency per pip-audit's default
  # OSV-backed check - that IS the severity threshold: zero-tolerance for
  # known-vulnerable pinned versions, not a CVSS cutoff. Triage flow for a
  # real hit: docs/DEPENDENCY_AUDIT.md.
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit

      - name: Audit server requirements
        run: pip-audit -r requirements.txt

      - name: Audit desktop requirements
        run: pip-audit -r requirements-desktop.txt

  # Wave 4 #3 — prove the vendored Tailwind build compiles. The dev host has no
  # Node, so CI is the verification that the config + the app's arbitrary-value
  # classes resolve. The Dockerfile runs the same build at image time.
  css:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build vendored Tailwind CSS
        run: |
          npx --yes tailwindcss@3.4.17 \
            -i static/forge/tailwind.input.css \
            -o /tmp/tailwind.css --minify
      - name: Verify the output is non-trivial and resolved real utilities
        run: |
          test -s /tmp/tailwind.css
          bytes=$(wc -c < /tmp/tailwind.css)
          echo "vendored tailwind.css = ${bytes} bytes"
          # spot-check utilities + an arbitrary-value class the app relies on
          grep -q '\.flex' /tmp/tailwind.css
          grep -q 'gold' /tmp/tailwind.css   # text-[var(--gold...)] arbitrary values
      - name: Upload for inspection
        uses: actions/upload-artifact@v4
        with:
          name: vendored-tailwind-css
          path: /tmp/tailwind.css
